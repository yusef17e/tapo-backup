# tapo-backup configuration
# Secrets (passwords, IPs) go in the .env file — not here.

# ── Cameras ────────────────────────────────────────────────────────────────
# Format: "Display Name": "IP address"
# Find the IP in the Tapo app: tap camera → gear icon → Device Info → IP Address
cameras:
  "Jiu-Jitsu Room 1": "192.168.0.190"
  "Jiu-Jitsu Room 2": "192.168.0.24"

# ── Download ───────────────────────────────────────────────────────────────
# How many days back to check for recordings on each run.
# 2 is recommended: if the script misses a night it will catch it next run.
lookback_days: 2

# Where clips are saved locally before upload.
download_dir: "./downloads"

# Delete local copies immediately after successful upload (0 = delete right away).
# Set to e.g. 3 to keep a 3-day local buffer.
local_retention_days: 0

# Skip the download if the gym PC has less than this many GB free.
# Prevents the hard drive from filling up if uploads fail for multiple days.
# Tune this once you know how large a typical night's footage is.
# Rule of thumb: set it to 2× the size of one full night's footage from both cameras.
min_free_disk_gb: 10

# ── Server (SSH/SFTP) ──────────────────────────────────────────────────────
# These values are overridden by SSH_* environment variables in .env.
# Leave them blank here and fill in .env instead.
server:
  host: ""          # set SSH_HOST in .env
  port: 22          # set SSH_PORT in .env (optional, defaults to 22)
  username: ""      # set SSH_USER in .env
  remote_dir: "/tapo-footage"  # set SSH_REMOTE_DIR in .env

  # Delete footage from the server that is older than this many days.
  # 0 = keep everything forever (not recommended once you know your storage usage).
  # Tune this based on your friend's server capacity and how far back you need clips.
  retention_days: 30

# ── Schedule filter ────────────────────────────────────────────────────────
# Only clips whose timestamps fall within these windows are uploaded.
# Times are 24-hour local camera time. Days not listed are skipped entirely.
# Remove this block to upload all clips regardless of time.
schedules:
  monday:    {start: "19:00", end: "20:40"}
  tuesday:   {start: "19:00", end: "20:40"}
  wednesday: {start: "19:00", end: "20:40"}
  thursday:  {start: "19:00", end: "20:40"}
  friday:    {start: "19:00", end: "20:40"}
  sunday:    {start: "11:00", end: "13:00"}

# ── Logging ────────────────────────────────────────────────────────────────
log_dir: "./logs"
